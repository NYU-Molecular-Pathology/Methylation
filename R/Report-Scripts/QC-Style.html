<!doctype html>
<style>

    body {

}

h2.section.level2 {

    font-size: 24px;

}

.main-container {
    max-width: 65% !important;
    margin-left: 25px !important;
    padding: 10px;
    
}

.purplediv{
    background-image:linear-gradient(to right, mediumpurple, #fff, #fff)!important; 
    border-radius: 18px;
    padding: 5px; 
    border-padding:6px;
    width:1900px !important;
}

div.main-container {
    max-width: 65% !important;
    margin-left: 25px !important;
    padding: 10px !important
}

div.container-fluid {
    max-width: 65% !important;
    margin-left: 25px !important;
    padding: 10px !important
}

table.table.table-striped {
    margin-left: 0px;
    margin-right: auto;
    align: "left";
}

table {
    align: "left" !important;
}

ul, li {
    margin: 2px;
    font-size: 16px;
    list-style-type: none;
    color: darkred;
    background: #ff9999;
    padding: 5px;
    margin-left: 25px;
    list-style-type: none;
    width: 65%;
}

.main-container {
    max-width: 2000px !important;
}

.table tbody tr:nth-child(even) {
    background-color: #f2f2f2 !important;
}

.table thead th {
    background-color: #89CFF0 !important;
    font-size: 14px;
}

tbody {
    font-size: 11px;
}

hr {
    page-break-after: always;
}

.hr {
    page-break-after: always;
}
    
ul.scrs {
    color:black; 
    background: lightblue; 
    padding: 10px; 
    margin-left: 35px;
    list-style-type:none;
    width:65%;    
}

.table>tbody>tr>td,
.table>tbody>tr>th,
.table>tfoot>tr>td,
.table>tfoot>tr>th,
.table>thead>tr>td,
.table>thead>tr>th {
    padding: 2px !important;
    line-height: 1.2 !important;
    vertical-align: top;
    border-top: 1px solid #ddd;
    font-size:12pt !important;
}
    
.table-condensed>tbody>tr>td,
.table-condensed>tbody>tr>th,
.table-condensed>tfoot>tr>td,
.table-condensed>tfoot>tr>th,
.table-condensed>thead>tr>td,
.table-condensed>thead>tr>th {
    padding: 2px !important
}
    
.tbody{
    padding: 2px !important;
}
    
.tr{
    padding: 2px !important;
}
    
p.mnpnote::after {
    color:#00008B;
    font-size:14px;
    content:'Having a Brain Classifier Score below 0.90 does not indicate the sample failed QC.'
}
    
p.qcnote::after {
    color:#00008B;
    font-size:14px;
    content:'Brain classifier output score is not included as part of sample QC. Samples can pass QC and also have no matching Brain tumor classification.'
}
   
</style>

<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<script>
    var doc = new jsPDF();
    var specialElementHandlers = {
        '#editor': function (element, renderer) { return true; }
    };

    $('#cmd').click(function () {
        doc.fromHTML($('#content').html(), 15, 15, {
            'width': 170,
            'elementHandlers': specialElementHandlers
        });
        doc.save('sample-file.pdf');
    });
</script>

<div id="editor"></div>

<script>
    const btn = document.getElementById("button");

    btn.addEventListener("click", function () {
        var element = document.getElementById('body');
        html2pdf().from(element).save('filename.pdf');
    });
</script>

</html>
